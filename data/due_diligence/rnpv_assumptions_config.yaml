schema_version: "1.0"
valuation_year: 2026

launch_timing:
  default_years_to_launch_by_phase:
    PHASE1: 6
    Phase I: 6
    PHASE2: 4
    Phase II: 4
    PHASE3: 2
    Phase III: 2
    NDA/BLA: 1
    APPROVED: 0
    default: 4

discount_rate: 0.12
tax_rate: 0.21
operating_margin: 0.65

development_costs:
  default_allocation: evenly_until_launch
  by_phase:
    PHASE1:
      total_cost: 450000000
      source: default YAML assumption
    Phase I:
      total_cost: 450000000
      source: default YAML assumption
    PHASE2:
      total_cost: 250000000
      source: default YAML assumption
    Phase II:
      total_cost: 250000000
      source: default YAML assumption
    PHASE3:
      total_cost: 125000000
      source: default YAML assumption
    Phase III:
      total_cost: 125000000
      source: default YAML assumption
    NDA/BLA:
      total_cost: 50000000
      source: default YAML assumption
    default:
      total_cost: 250000000
      source: default YAML assumption

extrapolation:
  enabled: true
  annual_growth_rate: 0.02
  max_years_after_explicit_forecast: 15
  source: default YAML assumption

post_loe_erosion:
  enabled: true
  years_after_loe: 5
  by_modality:
    small molecule:
      year_1_multiplier: 0.20
      annual_decline_after_year_1: 0.05
      floor_multiplier: 0.05
    biologic:
      year_1_multiplier: 0.45
      annual_decline_after_year_1: 0.08
      floor_multiplier: 0.15
    antibody:
      year_1_multiplier: 0.45
      annual_decline_after_year_1: 0.08
      floor_multiplier: 0.15
    default:
      year_1_multiplier: 0.35
      annual_decline_after_year_1: 0.07
      floor_multiplier: 0.10

sensitivity:
  pos:
    low_multiplier: 0.75
    high_multiplier: 1.25
  discount_rate:
    low_delta: -0.02
    high_delta: 0.02
  loe_year:
    low_delta: -2
    high_delta: 2
  peak_net_sales:
    low_multiplier: 0.80
    high_multiplier: 1.20
  operating_margin:
    low_delta: -0.10
    high_delta: 0.10
  development_cost:
    low_multiplier: 0.75
    high_multiplier: 1.25
